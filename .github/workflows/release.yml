name: Release (build, scan & push images)

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  images:
    name: Build, scan & push (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: back
            context: ./back
          - name: front
            context: ./front
    steps:
      - uses: actions/checkout@v4

      - name: Compute image name (lowercase owner)
        id: img
        run: |
          owner="${{ github.repository_owner }}"
          echo "image=ghcr.io/${owner,,}/comutitre-${{ matrix.name }}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build locally first so we can scan before publishing.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: runner
          load: true
          tags: |
            ${{ steps.img.outputs.image }}:${{ github.sha }}
            ${{ steps.img.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan (gate on CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ steps.img.outputs.image }}:${{ github.sha }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Push image
        run: |
          docker push ${{ steps.img.outputs.image }}:${{ github.sha }}
          docker push ${{ steps.img.outputs.image }}:latest

  deploy:
    name: Deploy to Swarm
    needs: images
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: azureuser
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            owner="${{ github.repository_owner }}"
            SHA="${{ github.sha }}"
            BACK_IMAGE="ghcr.io/${owner,,}/comutitre-back:${SHA}"
            FRONT_IMAGE="ghcr.io/${owner,,}/comutitre-front:${SHA}"

            # 1. Migrations avec la nouvelle image du back
            docker service update --image "${BACK_IMAGE}" --force comutitre_migrate

            # Attendre que les migrations se terminent (max 2 min)
            for i in $(seq 1 24); do
              state=$(docker service ps comutitre_migrate --format '{{.CurrentState}}' | head -1)
              echo "migrate: $state"
              if echo "$state" | grep -q "^Complete"; then break; fi
              if echo "$state" | grep -qE "^Failed|^Rejected"; then
                echo "Migration failed!" && exit 1
              fi
              sleep 5
            done

            # 2. Rolling update du backend (start-first + healthcheck + rollback auto si KO)
            docker service update --image "${BACK_IMAGE}" comutitre_back

            # 3. Rolling update du frontend
            docker service update --image "${FRONT_IMAGE}" comutitre_front
