# Local development stack with live reload.
#   cp .env.dev.example .env.dev   # then adjust
#   docker compose -f docker/docker-compose.dev.yml up
services:
  back:
    image: node:22-alpine
    container_name: comutitre_back_dev
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm migration:run && pnpm start:dev"
    volumes:
      - ../back:/app
      - /app/node_modules
    ports:
      - '3000:3000'
    environment:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
    env_file:
      - ../.env.dev
    depends_on:
      db:
        condition: service_healthy
    tty: true
    stdin_open: true

  front:
    image: node:22-alpine
    container_name: comutitre_front_dev
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm dev --host"
    volumes:
      - ../front:/app
      - /app/node_modules
    ports:
      - '5173:5173'
    environment:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
      # Override .env.local to use real auth in Docker
      VITE_MOCK_AUTH: 'false'
    env_file:
      - ../front/.env.example
    tty: true
    stdin_open: true

  db:
    image: postgres:16-alpine
    container_name: comutitre_db_dev
    env_file:
      - ../.env.dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 5

  ngrok:
    image: ngrok/ngrok:latest
    container_name: comutitre_ngrok_dev
    command: http back:3000 --log=stdout
    env_file:
      - ../.env.dev
    ports:
      - '4040:4040'
    depends_on:
      - back

volumes:
  postgres_dev_data:
